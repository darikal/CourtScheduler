<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Court Scheduler — Tennis & Pickleball</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --court-green: #2d5a27;
    --court-mid: #3d7a35;
    --court-light: #5a9e50;
    --lime: #b5f03d;
    --lime-dark: #8fbe28;
    --cream: #f5f0e8;
    --sand: #e8dfc8;
    --dark: #1a1a1a;
    --white: #ffffff;
    --line-white: rgba(255,255,255,0.85);
    --shadow: 0 8px 40px rgba(0,0,0,0.18);
    --radius: 12px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: var(--court-green);
    position: relative;
    overflow: hidden;
    padding: 28px 40px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent,
      transparent 60px,
      rgba(255,255,255,0.04) 60px,
      rgba(255,255,255,0.04) 62px
    );
    pointer-events: none;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 2px;
    height: 100%;
    background: var(--line-white);
    opacity: 0.2;
  }
  .header-left h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    color: var(--lime);
    letter-spacing: 2px;
    line-height: 1;
  }
  .header-left p {
    color: rgba(255,255,255,0.65);
    font-size: 0.85rem;
    font-weight: 300;
    letter-spacing: 0.5px;
    margin-top: 4px;
  }
  .header-badge {
    background: var(--lime);
    color: var(--court-green);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 1.5px;
    padding: 6px 16px;
    border-radius: 100px;
  }

  /* MAIN LAYOUT */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 20px 60px;
  }

  /* MONTH NAV */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .month-nav h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 2px;
    color: var(--court-green);
  }
  .nav-btn {
    background: var(--court-green);
    color: var(--lime);
    border: none;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.1s;
  }
  .nav-btn:hover { background: var(--court-mid); transform: scale(1.05); }
  .nav-btn:active { transform: scale(0.96); }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.8rem;
    color: #555;
    font-weight: 500;
  }
  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
  }
  .dot-singles { background: #3b82f6; }
  .dot-doubles { background: #f59e0b; }
  .dot-mixed { background: linear-gradient(135deg, #3b82f6 50%, #f59e0b 50%); }
  .dot-empty { background: #ddd; border: 1.5px dashed #aaa; }

  /* CALENDAR GRID */
  .cal-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-bottom: 8px;
  }
  .cal-header span {
    text-align: center;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--court-green);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }

  /* DAY CELL */
  .day-cell {
    background: var(--white);
    border-radius: var(--radius);
    padding: 10px 8px 8px;
    min-height: 90px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.1s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
  }
  .day-cell:hover:not(.past):not(.empty) {
    border-color: var(--court-mid);
    box-shadow: 0 4px 20px rgba(45,90,39,0.15);
    transform: translateY(-2px);
  }
  .day-cell.empty {
    background: transparent;
    cursor: default;
    border: none;
  }
  .day-cell.past {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .day-cell.today {
    border-color: var(--lime);
    background: linear-gradient(135deg, #fff 70%, #f0fae0);
  }
  .day-cell.has-players {
    border-color: rgba(45,90,39,0.2);
  }

  .day-num {
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--dark);
    display: block;
    margin-bottom: 6px;
  }
  .day-cell.today .day-num {
    color: var(--court-green);
    position: relative;
  }
  .day-cell.today .day-num::after {
    content: '';
    position: absolute;
    bottom: -2px; left: 0;
    width: 100%; height: 2px;
    background: var(--lime);
    border-radius: 2px;
  }

  .player-chips {
    display: flex;
    flex-direction: column;
    gap: 3px;
    margin-top: 4px;
  }
  .player-chip {
    font-size: 0.68rem;
    font-weight: 500;
    padding: 2px 6px;
    border-radius: 100px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .chip-singles { background: #dbeafe; color: #1d4ed8; }
  .chip-doubles { background: #fef3c7; color: #b45309; }

  .more-label {
    font-size: 0.65rem;
    color: #888;
    margin-top: 2px;
    padding-left: 2px;
  }

  .add-hint {
    position: absolute;
    bottom: 6px;
    right: 8px;
    font-size: 1.2rem;
    color: var(--court-mid);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .day-cell:hover:not(.past):not(.empty) .add-hint { opacity: 0.5; }

  /* MODAL OVERLAY */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(3px);
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--white);
    border-radius: 20px;
    width: 100%;
    max-width: 520px;
    overflow: hidden;
    box-shadow: var(--shadow);
    animation: slideUp 0.22s ease-out;
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .modal-header {
    background: var(--court-green);
    padding: 22px 28px 18px;
    position: relative;
  }
  .modal-header h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    color: var(--lime);
    letter-spacing: 1.5px;
  }
  .modal-header p {
    color: rgba(255,255,255,0.6);
    font-size: 0.82rem;
    margin-top: 2px;
  }
  .modal-close {
    position: absolute;
    top: 16px; right: 18px;
    background: rgba(255,255,255,0.12);
    border: none;
    color: white;
    width: 32px; height: 32px;
    border-radius: 50%;
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .modal-close:hover { background: rgba(255,255,255,0.22); }

  .modal-body { padding: 24px 28px 28px; }

  /* PLAYER LIST IN MODAL */
  .players-section { margin-bottom: 24px; }
  .players-section h4 {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
    margin-bottom: 10px;
  }
  .player-list { display: flex; flex-direction: column; gap: 8px; }
  .player-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--cream);
    border-radius: 10px;
    padding: 10px 14px;
    gap: 10px;
  }
  .player-info { flex: 1; min-width: 0; }
  .player-name {
    font-weight: 600;
    font-size: 0.9rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-meta {
    font-size: 0.75rem;
    color: #888;
    margin-top: 1px;
  }
  .badge {
    font-size: 0.7rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 100px;
    white-space: nowrap;
    letter-spacing: 0.3px;
    flex-shrink: 0;
  }
  .badge-singles { background: #dbeafe; color: #1d4ed8; }
  .badge-doubles { background: #fef3c7; color: #b45309; }
  .delete-btn {
    background: none;
    border: none;
    color: #ccc;
    cursor: pointer;
    font-size: 1rem;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color 0.1s;
    flex-shrink: 0;
  }
  .delete-btn:hover { color: #ef4444; }
  .no-players {
    text-align: center;
    padding: 16px;
    color: #aaa;
    font-size: 0.85rem;
    font-style: italic;
    background: var(--cream);
    border-radius: 10px;
    border: 2px dashed #ddd;
  }

  /* SIGNUP FORM */
  .form-section h4 {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
    margin-bottom: 14px;
  }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }
  .form-grid .full { grid-column: 1 / -1; }
  label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    color: #555;
    margin-bottom: 5px;
    letter-spacing: 0.3px;
  }
  input[type="text"], input[type="email"], textarea, select {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--dark);
    background: var(--cream);
    transition: border-color 0.15s;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }
  input:focus, textarea:focus, select:focus {
    border-color: var(--court-mid);
    background: white;
  }
  textarea { resize: none; height: 68px; }

  /* GAME TYPE TOGGLE */
  .game-type-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .type-btn {
    background: var(--cream);
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    padding: 10px 8px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .type-btn .type-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }
  .type-btn .type-label {
    font-size: 0.8rem;
    font-weight: 600;
    color: #555;
  }
  .type-btn.selected.singles {
    border-color: #3b82f6;
    background: #eff6ff;
  }
  .type-btn.selected.singles .type-label { color: #1d4ed8; }
  .type-btn.selected.doubles {
    border-color: #f59e0b;
    background: #fffbeb;
  }
  .type-btn.selected.doubles .type-label { color: #b45309; }

  .submit-btn {
    width: 100%;
    background: var(--court-green);
    color: var(--lime);
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 1.5px;
    cursor: pointer;
    margin-top: 14px;
    transition: background 0.15s, transform 0.1s;
  }
  .submit-btn:hover { background: var(--court-mid); transform: translateY(-1px); }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--dark);
    color: white;
    padding: 12px 24px;
    border-radius: 100px;
    font-size: 0.85rem;
    font-weight: 500;
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.success { background: var(--court-green); }
  .toast.error { background: #ef4444; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* LOADING */
  .cal-loading {
    text-align: center;
    padding: 60px 0;
    color: #aaa;
    font-size: 0.9rem;
    letter-spacing: 0.5px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid #eee;
    border-top-color: var(--court-green);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 640px) {
    header { padding: 18px 16px; }
    main { padding: 24px 12px 50px; }
    .form-grid { grid-template-columns: 1fr; }
    .form-grid .full { grid-column: 1; }
    .day-cell { min-height: 70px; padding: 8px 5px 6px; }
    .day-num { font-size: 0.82rem; }
    .player-chip { display: none; }
    .add-hint { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>🎾 Court Scheduler</h1>
    <p>Tennis &amp; Pickleball — Sign up, show up, play</p>
  </div>
  <div class="header-badge">Open Courts</div>
</header>

<main>
  <div class="month-nav">
    <button class="nav-btn" id="prevMonth">&#8592;</button>
    <h2 id="monthTitle">Loading...</h2>
    <button class="nav-btn" id="nextMonth">&#8594;</button>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot dot-singles"></div> Singles</div>
    <div class="legend-item"><div class="legend-dot dot-doubles"></div> Doubles</div>
    <div class="legend-item"><div class="legend-dot dot-empty"></div> No players yet — be first!</div>
  </div>

  <div class="cal-header">
    <span>Sun</span><span>Mon</span><span>Tue</span>
    <span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
  </div>
  <div class="cal-grid" id="calGrid">
    <div class="cal-loading"><div class="spinner"></div>Loading schedule...</div>
  </div>
</main>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 id="modalDateTitle">Date</h3>
      <p id="modalDateSub">Click a name to remove yourself</p>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body">
      <div class="players-section">
        <h4>Who's Playing</h4>
        <div class="player-list" id="playerList"></div>
      </div>
      <div class="form-section">
        <h4>Count Me In</h4>
        <div class="form-grid">
          <div>
            <label for="inputName">Your Name *</label>
            <input type="text" id="inputName" placeholder="e.g. Alex Johnson" autocomplete="name" />
          </div>
          <div>
            <label for="inputEmail">Email (optional)</label>
            <input type="email" id="inputEmail" placeholder="for reminders" autocomplete="email" />
          </div>
          <div class="full">
            <label>Game Type *</label>
            <div class="game-type-group">
              <button class="type-btn singles selected" data-type="singles">
                <span class="type-icon">🎾</span>
                <span class="type-label">Singles (1v1)</span>
              </button>
              <button class="type-btn doubles" data-type="doubles">
                <span class="type-icon">👥</span>
                <span class="type-label">Doubles (2v2)</span>
              </button>
            </div>
          </div>
          <div class="full">
            <label for="inputNote">Note (optional)</label>
            <textarea id="inputNote" placeholder="e.g. Prefer morning, beginner-friendly..."></textarea>
          </div>
        </div>
        <button class="submit-btn" id="submitBtn">SIGN ME UP</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = '';  // Same origin — backend serves frontend
  
  let currentDate = new Date();
  let currentYear = currentDate.getFullYear();
  let currentMonth = currentDate.getMonth(); // 0-indexed
  let sessionCache = {};
  let activeDate = null;
  let selectedGameType = 'singles';

  const calGrid = document.getElementById('calGrid');
  const monthTitle = document.getElementById('monthTitle');
  const overlay = document.getElementById('overlay');
  const modalDateTitle = document.getElementById('modalDateTitle');
  const playerList = document.getElementById('playerList');
  const submitBtn = document.getElementById('submitBtn');
  const inputName = document.getElementById('inputName');
  const inputEmail = document.getElementById('inputEmail');
  const inputNote = document.getElementById('inputNote');

  const MONTH_NAMES = ['January','February','March','April','May','June',
    'July','August','September','October','November','December'];
  const DAY_NAMES_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  // ── UTILS ──────────────────────────────────────────────────────────────────
  function padDate(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }
  function friendlyDate(dateStr) {
    const [y, m, d] = dateStr.split('-').map(Number);
    const dt = new Date(y, m-1, d);
    return dt.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
  }
  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type}`;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }
  function isToday(y, m, d) {
    const n = new Date();
    return n.getFullYear()===y && n.getMonth()===m && n.getDate()===d;
  }
  function isPast(y, m, d) {
    const n = new Date(); n.setHours(0,0,0,0);
    return new Date(y, m, d) < n;
  }

  // ── API ────────────────────────────────────────────────────────────────────
  async function fetchMonth(y, m) {
    const key = `${y}-${String(m+1).padStart(2,'0')}`;
    const res = await fetch(`${API}/api/sessions?month=${key}`);
    const sessions = await res.json();
    sessionCache = {};
    sessions.forEach(s => { sessionCache[s.date] = s; });
  }

  async function signUp(dateStr, name, email, gameType, note) {
    const res = await fetch(`${API}/api/sessions/${dateStr}/signup`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, gameType, note })
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || 'Failed to sign up');
    }
    return res.json();
  }

  async function removePlayer(dateStr, playerId) {
    const res = await fetch(`${API}/api/sessions/${dateStr}/signup/${playerId}`, {
      method: 'DELETE'
    });
    if (!res.ok) throw new Error('Failed to remove player');
    return res.json();
  }

  // ── CALENDAR ───────────────────────────────────────────────────────────────
  async function renderCalendar() {
    monthTitle.textContent = `${MONTH_NAMES[currentMonth]} ${currentYear}`;
    calGrid.innerHTML = '<div class="cal-loading"><div class="spinner"></div>Loading...</div>';
    await fetchMonth(currentYear, currentMonth);
    buildGrid();
  }

  function buildGrid() {
    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

    let html = '';
    for (let i = 0; i < firstDay; i++) {
      html += `<div class="day-cell empty"></div>`;
    }
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = padDate(currentYear, currentMonth, d);
      const session = sessionCache[dateStr] || { players: [] };
      const players = session.players || [];
      const today = isToday(currentYear, currentMonth, d);
      const past = isPast(currentYear, currentMonth, d);

      let classes = 'day-cell';
      if (today) classes += ' today';
      if (past) classes += ' past';
      if (players.length > 0) classes += ' has-players';

      const MAX_SHOW = 2;
      const chipsHtml = players.slice(0, MAX_SHOW).map(p =>
        `<div class="player-chip chip-${p.gameType}">${p.name.split(' ')[0]}</div>`
      ).join('');
      const moreHtml = players.length > MAX_SHOW
        ? `<div class="more-label">+${players.length - MAX_SHOW} more</div>` : '';

      html += `
        <div class="${classes}" data-date="${dateStr}" ${past ? '' : 'onclick="openModal(\''+dateStr+'\')"'}>
          <span class="day-num">${d}</span>
          <div class="player-chips">${chipsHtml}${moreHtml}</div>
          ${!past ? '<span class="add-hint">+</span>' : ''}
        </div>`;
    }
    calGrid.innerHTML = html;
  }

  // ── MODAL ──────────────────────────────────────────────────────────────────
  function openModal(dateStr) {
    activeDate = dateStr;
    modalDateTitle.textContent = friendlyDate(dateStr);
    renderPlayerList(dateStr);
    resetForm();
    overlay.classList.add('open');
  }

  function renderPlayerList(dateStr) {
    const session = sessionCache[dateStr] || { players: [] };
    const players = session.players || [];
    if (players.length === 0) {
      playerList.innerHTML = `<div class="no-players">No players yet — sign up below and be the first! 🎾</div>`;
      return;
    }
    playerList.innerHTML = players.map(p => `
      <div class="player-row">
        <div class="player-info">
          <div class="player-name">${escapeHtml(p.name)}</div>
          ${p.note ? `<div class="player-meta">${escapeHtml(p.note)}</div>` : ''}
        </div>
        <span class="badge badge-${p.gameType}">${p.gameType === 'singles' ? 'Singles' : 'Doubles'}</span>
        <button class="delete-btn" title="Remove this signup" onclick="handleRemove('${dateStr}','${p._id}')">🗑</button>
      </div>
    `).join('');
  }

  function closeModal() {
    overlay.classList.remove('open');
    activeDate = null;
  }

  function resetForm() {
    inputName.value = '';
    inputEmail.value = '';
    inputNote.value = '';
    selectedGameType = 'singles';
    document.querySelectorAll('.type-btn').forEach(b => {
      b.classList.toggle('selected', b.dataset.type === 'singles');
    });
    submitBtn.disabled = false;
    submitBtn.textContent = 'SIGN ME UP';
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ── EVENTS ─────────────────────────────────────────────────────────────────
  document.getElementById('prevMonth').addEventListener('click', () => {
    currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    renderCalendar();
  });
  document.getElementById('nextMonth').addEventListener('click', () => {
    currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    renderCalendar();
  });
  document.getElementById('modalClose').addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

  document.querySelectorAll('.type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedGameType = btn.dataset.type;
      document.querySelectorAll('.type-btn').forEach(b => {
        b.classList.toggle('selected', b.dataset.type === selectedGameType);
      });
    });
  });

  submitBtn.addEventListener('click', async () => {
    const name = inputName.value.trim();
    if (!name) { showToast('Please enter your name', 'error'); inputName.focus(); return; }
    submitBtn.disabled = true;
    submitBtn.textContent = 'SIGNING UP...';
    try {
      const session = await signUp(activeDate, name, inputEmail.value, selectedGameType, inputNote.value);
      sessionCache[activeDate] = session;
      buildGrid();
      renderPlayerList(activeDate);
      inputName.value = ''; inputEmail.value = ''; inputNote.value = '';
      showToast(`✅ You're on for ${friendlyDate(activeDate)}!`);
    } catch (err) {
      showToast(err.message, 'error');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'SIGN ME UP';
    }
  });

  async function handleRemove(dateStr, playerId) {
    if (!confirm('Remove this signup?')) return;
    try {
      const session = await removePlayer(dateStr, playerId);
      sessionCache[dateStr] = session;
      buildGrid();
      renderPlayerList(dateStr);
      showToast('Signup removed.');
    } catch (err) {
      showToast('Could not remove signup.', 'error');
    }
  }

  // ── INIT ───────────────────────────────────────────────────────────────────
  renderCalendar();
</script>
</body>
</html>
